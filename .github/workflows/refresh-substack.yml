name: Refresh Substack Posts

on:
  schedule:
    # 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest Substack posts
        run: node scripts/fetch-substack.mjs

      - name: Commit updated posts (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/substack-posts.json
          # Only commit when there are actual changes
          git diff --staged --quiet || git commit -m "chore: refresh Substack posts [skip ci]"

      - name: Push changes
        run: git push
